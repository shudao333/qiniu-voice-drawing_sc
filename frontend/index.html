<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>AI 语音绘图工具</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container">
        <h1>AI 语音绘图工具</h1>
        
        <div class="speech-controls">
            <button id="mic-btn">🎤 载入中...</button>
            <p id="status-text">初始化中...</p>
        </div>

        <div class="result-container">
            <h3>识别结果：</h3>
            <div id="result-box" class="box">等待语音输入...</div>
        </div>

        <div id="app">
            <!-- 基础交互和绘图容器将在后续添加 -->
        </div>
    </div>
    
    <script src="/js/api.js"></script>
    <script src="/js/parser.js"></script>
    <script src="/js/executor.js"></script>
    <script src="/js/speech.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
